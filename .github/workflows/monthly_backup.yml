name: Monthly Database Backup

on:
  schedule:
    # This runs at 00:00 on the 1st day of every month
    - cron: '0 0 1 * *'
  workflow_dispatch: # Allows you to run it manually anytime

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install PostgreSQL Client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Run Backup
        env:
          # We will set these secrets in GitHub settings next
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          pg_dump "postgresql://postgres:$PGPASSWORD@$DB_URL:5432/postgres" > backup_$(date +%Y-%m-%d).sql

      - name: Upload Backup to GitHub
        uses: actions/upload-artifact@v3
        with:
          name: supabase-backup-${{ github.run_id }}
          path: backup_*.sql
          retention-days: 90 # Keeps the file for 3 months

name: Monthly Database Backup

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch: 

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install PostgreSQL Client 17
        run: |
          # Add official PostgreSQL repository
          sudo apt install curl ca-certificates
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc --fail https://www.postgresql.org/media/keys/ACCC4CF8.asc
          sudo sh -c 'echo "deb [arch=amd64 signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          
          # Install version 17
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

          # FORCE the robot to use the new version 17 by adding it to its "Search Path"
          echo "/usr/lib/postgresql/17/bin" >> $GITHUB_PATH

      - name: Run Backup
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          # Now the robot will use pg_dump version 17 automatically
          pg_dump "postgresql://postgres.xyyirkwiredufamtnqdu:$PGPASSWORD@aws-1-ap-southeast-2.pooler.supabase.com:6543/postgres?sslmode=disable" > backup_$(date +%Y-%m-%d).sql

      - name: Upload Backup to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: hydrin-backup-${{ github.run_id }}
          path: backup_*.sql
          retention-days: 90
